<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐾 Сапёр (Telegram Game)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #2b2b2b;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: manipulation;
        }
        .game-container {
            background: #bdbdbd;
            padding: 20px;
            border-radius: 8px;
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            border-right: 3px solid #7b7b7b;
            border-bottom: 3px solid #7b7b7b;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 5px 10px;
            background: #c0c0c0;
            border-top: 2px solid #7b7b7b;
            border-left: 2px solid #7b7b7b;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .mine-counter, .smiley {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            background: black;
            color: #ff3333;
            padding: 2px 8px;
            border-top: 2px solid #7b7b7b;
            border-left: 2px solid #7b7b7b;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            text-align: center;
        }
        .smiley {
            width: 50px;
            background: #c0c0c0;
            color: black;
            cursor: pointer;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #7b7b7b;
            border-bottom: 2px solid #7b7b7b;
            padding: 0;
            line-height: 40px;
            font-size: 28px;
        }
        .smiley:active {
            border-top: 2px solid #7b7b7b;
            border-left: 2px solid #7b7b7b;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .board {
            display: grid;
            background: #bdbdbd;
            border-top: 3px solid #7b7b7b;
            border-left: 3px solid #7b7b7b;
            border-right: 3px solid #ffffff;
            border-bottom: 3px solid #ffffff;
            padding: 3px;
        }
        .cell {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            cursor: pointer;
        }
        .cell.revealed {
            border: 1px solid #999;
            background: #bdbdbd;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
        }
        .cell.flagged::before {
            content: "⚑";
            color: #d00000;
            font-size: 20px;
            line-height: 1;
        }
        .num1 { color: #0100fe; }
        .num2 { color: #017f01; }
        .num3 { color: #fe0000; }
        .num4 { color: #010080; }
        .num5 { color: #7f0100; }
        .num6 { color: #008080; }
        .num7 { color: #000000; }
        .num8 { color: #808080; }
        .mine-icon { font-size: 18px; }

        /* Кнопка "Поделиться" */
        #share-container {
            text-align: center;
            margin-top: 15px;
        }
        #shareBtn {
            display: none;
            background: #4a90e2;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #shareBtn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="mine-counter" id="mine-counter">010</div>
        <div class="smiley" id="reset-btn">😊</div>
    </div>
    <div class="board" id="board"></div>
    <div id="share-container">
        <button id="shareBtn" onclick="shareMyScore()">📢 Поделиться рекордом</button>
    </div>
</div>

<!-- Telegram Game SDK -->
<script src="https://telegram.org/js/games.js"></script>

<script>
    (function() {
        // --- НАСТРОЙКИ ИГРЫ ---
        const ROWS = 9;
        const COLS = 9;
        const TOTAL_MINES = 10;

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let board = [];
        let mines = [];
        let revealed = [];
        let flagged = [];
        let gameOver = false;
        let gameWin = false;
        let minesCount = TOTAL_MINES;
        let cellsRevealed = 0;
        let startTime = null;
        let endTime = null;
        let finalScore = 0;

        const boardEl = document.getElementById('board');
        const mineCounterEl = document.getElementById('mine-counter');
        const resetBtn = document.getElementById('reset-btn');
        const shareBtn = document.getElementById('shareBtn');

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function updateMinesCounter() {
            let display = minesCount;
            if (display < 0) display = 0;
            let str = display.toString();
            while (str.length < 3) str = '0' + str;
            mineCounterEl.textContent = str;
        }

        function initBoard(firstClickRow = -1, firstClickCol = -1) {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            mines = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            revealed = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            flagged = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            gameOver = false;
            gameWin = false;
            minesCount = TOTAL_MINES;
            cellsRevealed = 0;
            startTime = Date.now();
            shareBtn.style.display = 'none';

            let minesPlaced = 0;
            while (minesPlaced < TOTAL_MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                if (mines[r][c]) continue;
                if (r === firstClickRow && c === firstClickCol) continue;
                mines[r][c] = true;
                minesPlaced++;
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (mines[r][c]) {
                        board[r][c] = -1;
                        continue;
                    }
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            const nr = r + dr;
                            const nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && mines[nr][nc]) {
                                count++;
                            }
                        }
                    }
                    board[r][c] = count;
                }
            }

            renderBoard();
            updateMinesCounter();
            resetBtn.textContent = '😊';
        }

        function renderBoard() {
            boardEl.style.gridTemplateColumns = `repeat(${COLS}, 32px)`;
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (mines[r][c]) {
                            cell.innerHTML = '<span class="mine-icon">💣</span>';
                            cell.style.backgroundColor = '#ffaaaa';
                        } else {
                            const val = board[r][c];
                            if (val > 0) {
                                cell.textContent = val;
                                cell.classList.add(`num${val}`);
                            }
                        }
                    } else {
                        if (flagged[r][c]) {
                            cell.classList.add('flagged');
                        }
                    }
                    boardEl.appendChild(cell);
                }
            }
        }

        function revealCell(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            if (revealed[r][c]) return;
            if (flagged[r][c]) return;
            if (gameOver || gameWin) return;

            // Безопасный первый ход: если первая клетка — мина, переставляем её
            if (cellsRevealed === 0 && mines[r][c]) {
                for (let rr = 0; rr < ROWS; rr++) {
                    let moved = false;
                    for (let cc = 0; cc < COLS; cc++) {
                        if (!mines[rr][cc] && !(rr === r && cc === c)) {
                            mines[rr][cc] = true;
                            mines[r][c] = false;
                            moved = true;
                            break;
                        }
                    }
                    if (moved) break;
                }
                // Пересчитываем числа
                for (let rr = 0; rr < ROWS; rr++) {
                    for (let cc = 0; cc < COLS; cc++) {
                        if (mines[rr][cc]) {
                            board[rr][cc] = -1;
                        } else {
                            let count = 0;
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    if (dr === 0 && dc === 0) continue;
                                    const nr = rr + dr;
                                    const nc = cc + dc;
                                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && mines[nr][nc]) count++;
                                }
                            }
                            board[rr][cc] = count;
                        }
                    }
                }
            }

            revealed[r][c] = true;
            cellsRevealed++;

            if (mines[r][c]) {
                gameOver = true;
                for (let rr = 0; rr < ROWS; rr++) {
                    for (let cc = 0; cc < COLS; cc++) {
                        if (mines[rr][cc]) revealed[rr][cc] = true;
                    }
                }
                resetBtn.textContent = '😵';
                renderBoard();
                return;
            }

            if (board[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        revealCell(r + dr, c + dc);
                    }
                }
            }

            renderBoard();
            checkWinCondition();
        }

        function checkWinCondition() {
            if (gameOver) return;
            const totalSafeCells = ROWS * COLS - TOTAL_MINES;
            if (cellsRevealed === totalSafeCells) {
                gameWin = true;
                gameOver = true;
                endTime = Date.now();
                const timeSeconds = Math.floor((endTime - startTime) / 1000);
                // Счет = время (меньше — лучше), но Telegram считает, что больше = лучше.
                // Поэтому инвертируем: 999 - время. Или можно использовать количество открытых клеток.
                finalScore = 999 - timeSeconds;
                if (finalScore < 0) finalScore = 0;

                resetBtn.textContent = '😎';
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (mines[r][c] && !flagged[r][c]) {
                            flagged[r][c] = true;
                        }
                    }
                }
                minesCount = 0;
                updateMinesCounter();
                renderBoard();

                // --- ИНТЕГРАЦИЯ TELEGRAM: отправка счета ---
                if (typeof TelegramGameProxy !== 'undefined') {
                    TelegramGameProxy.setScore(finalScore, false);
                    console.log('Telegram: setScore', finalScore);
                    shareBtn.style.display = 'inline-block';
                } else {
                    alert('🎉 Поздравляем! Вы выиграли! Ваше время: ' + timeSeconds + ' сек.');
                }
            }
        }

        function toggleFlag(r, c) {
            if (gameOver || gameWin) return;
            if (revealed[r][c]) return;
            if (!flagged[r][c]) {
                flagged[r][c] = true;
                minesCount--;
            } else {
                flagged[r][c] = false;
                minesCount++;
            }
            updateMinesCounter();
            renderBoard();
        }

        // Функция для кнопки "Поделиться"
        window.shareMyScore = function() {
            if (typeof TelegramGameProxy !== 'undefined') {
                TelegramGameProxy.shareScore();
            } else {
                alert('Поделиться можно только внутри Telegram.');
            }
        };

        // Обработчики событий
        boardEl.addEventListener('click', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            if (gameOver || gameWin) return;
            if (revealed[row][col]) return;
            if (flagged[row][col]) return;
            revealCell(row, col);
        });

        boardEl.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const cell = e.target.closest('.cell');
            if (!cell) return;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            if (gameOver || gameWin) return;
            if (revealed[row][col]) return;
            toggleFlag(row, col);
        });

        resetBtn.addEventListener('click', () => {
            initBoard();
        });

        // Старт
        initBoard();
    })();
</script>
</body>
</html>
